# forge-context-engine — Engine Configuration for transaction-history-service
# Single-service Go backend. Initialized 2026-05-20.

forge_version: "0.2.2"   # synced with latest Forge v1 runtime
tier: standard

# Repo ini backend-only (Go gRPC service). Frontend, mobile, infrastructure dihapus.
# Infrastructure tidak diaktifkan — repo hanya punya migrations + build tooling + env config.
# Per v0.2.2 Layer Activation Rule, evidence untuk infrastructure butuh IaC / deploy logic / orchestration.
layers_enabled:
  - backend
  - testing

systems:
  - { name: transaction-history-service, type: service }

loading:
  default_mode: implementation  # ask | planning | implementation | execute | testing | review | incident | refactor
  respect_size_budget: true

runtime:
  profile: local
  non_interactive: false
  decision_authority: ai

size_budget:
  core_lines: 200
  layer_lines: 150
  system_lines: 200
  mode_lines: 40

governance:
  staleness_days: 90
  require_evidence_for: [confirmed, inferred]
  demote_confirmed_on_evidence_change: true
